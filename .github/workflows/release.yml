name: release

# Tag v13.* on this repo → build the Windows installer + electron-updater feed, attach to the GitHub
# Release. The app then self-updates from here (public repo → tokenless auto-update). v11 (Job-ext-app)
# is never touched; tagging Job-Board builds nothing.
on:
  push:
    tags:
      - 'v13.*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # create the release + upload the installer/latest.yml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: typecheck + test (gate the release)
        run: |
          npm run typecheck
          npm test

      - name: build bundle (esbuild)
        run: npm run build

      - name: package + publish (electron-builder rebuilds better-sqlite3 for the Electron ABI)
        working-directory: app
        run: npx electron-builder --config electron-builder.yml --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
