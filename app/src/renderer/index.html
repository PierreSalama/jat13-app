<!doctype html>
<html data-theme="dark" data-mode="dark">
<head>
  <meta charset="utf-8" />
  <!-- CSP: scripts only from our own bundle; inline styles allowed (dynamic widths / theme vars);
       fetch restricted to the loopback brain. No external hosts — the Atelier system ships self-hosted. -->
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src http://127.0.0.1:* http://localhost:*"
  />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Application Tracker · JAT 13</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- shared SVG defs: gold-leaf gradient (signet + all bronze fills) + gauge gradient -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="au" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#dcba8a" />
        <stop offset=".5" stop-color="#c9a373" />
        <stop offset="1" stop-color="#a07648" />
      </linearGradient>
      <linearGradient id="gaugeGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#b08a5a" />
        <stop offset="1" stop-color="#d8b585" />
      </linearGradient>
    </defs>
  </svg>

  <aside class="sidebar">
    <div class="brand" id="brand"></div>
    <button class="cmd" id="cmd-open" type="button" aria-label="Open command palette">
      <svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.2-3.2"/></svg>
      <span class="lbl">Search or command…</span>
      <kbd>Ctrl K</kbd>
    </button>
    <nav class="nav-scroll" id="nav"></nav>
    <div class="nav-foot">
      <div class="engine-chip off" id="engine-chip">
        <span class="dot dim" id="engine-dot"></span>
        <div>
          <div class="t1" id="engine-t1">Connecting…</div>
          <div class="t2" id="engine-t2">loopback</div>
        </div>
      </div>
      <div class="user-row">
        <div class="avatar" id="user-avatar">PS</div>
        <span class="name" id="user-name">Pierre Salama</span>
        <span class="plan">Atelier</span>
      </div>
    </div>
  </aside>

  <main class="content">
    <div class="topbar">
      <span class="crumb" id="crumb">Operate &nbsp;/&nbsp; <b>Command Center</b></span>
      <div class="spacer"></div>
      <span class="chip hidden" id="gmail-chip"></span>
      <button class="toggle" id="apply-toggle" type="button" disabled>
        Auto-Apply <span class="knob"></span>
      </button>
    </div>
    <section class="view" id="view"></section>
  </main>

  <div id="app-banner"></div>
  <div class="toasts" id="toasts"></div>
  <div id="overlay-root"></div>

  <script src="./main.js" type="module"></script>
</body>
</html>
